name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 装测试需要的轻量依赖：
          # - pytest: 测试框架
          # - PyYAML: config.py 加载 config.yaml
          # - charset-normalizer: TXT/MD 编码检测（extractors.py 用）
          # - markitdown[docx]: DOCX 提取（部分测试需要真实调用）
          # 不装 docling/PyMuPDF/transformers/python-pptx（重依赖，测试里都是延迟 import + monkeypatch）
          pip install pytest pytest-cov PyYAML charset-normalizer 'markitdown[docx]'

      - name: Run unit tests
        run: pytest tests/ -v
