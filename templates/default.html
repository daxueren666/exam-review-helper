<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末复习笔记 - [教材名称]</title>
<script>
    MathJax = {
        loader: { load: ['[tex]/mhchem'] },
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            packages: { '[+]': ['mhchem'] }
        },
        svg: { fontCache: 'global' }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
:root {
    /* C. 现代笔记 - 主色系（精炼到 3 色）*/
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --accent: #f59e0b;
    --bg: #fafaf8;            /* 温和米色（不是纯白）*/
    --bg-soft: #f4f4f1;
    --bg-card: #ffffff;
    --text: #0f172a;          /* 更深，对比度更高 */
    --text-soft: #64748b;
    --border: #e2e8f0;
    --code-bg: #f1f5f9;
    /* 多层阴影（更柔和）*/
    --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 2px 8px rgba(15,23,42,0.04);
    --shadow-hover: 0 4px 12px rgba(15,23,42,0.08), 0 8px 24px rgba(15,23,42,0.06);
    --shadow-card: 0 1px 3px rgba(15,23,42,0.05), 0 1px 2px rgba(15,23,42,0.03);
    --radius: 12px;           /* 圆角加大 */
    --radius-sm: 6px;
    --importance-core: #dc2626;
    --importance-major: var(--accent);
    --importance-minor: var(--text-soft);
    --pitfall-bg: #fef2f2;
    --pitfall-border: #fecaca;
    --formula-bg: #f0f9ff;
    --formula-border: #bae6fd;
    --example-bg: #f0fdf4;
    --example-border: #bbf7d0;
    /* frontend-design 语义 token */
    --diff-basic-bg: #e6f4ea;        --diff-basic-text: #34a853;
    --diff-intermediate-bg: #fef3c7; --diff-intermediate-text: #92400e;
    --diff-advanced-bg: #fee2e2;     --diff-advanced-text: #b91c1c;
    --status-mastered-bg: #e6f4ea;   --status-mastered-text: #34a853;
    --status-review-bg: #fef3c7;     --status-review-text: #92400e;
    --status-hard-bg: #fee2e2;       --status-hard-text: #b91c1c;
    --filter-banner-bg: #dbeafe;
    --filter-banner-text: #1e40af;
    --btn-hover-bg: #f1f5f9;
    --mistake-book-bg: linear-gradient(135deg, #fff5f5, #ffeaea);
    --mistake-book-border: #ea4335;
    --mistake-book-title: #ea4335;
    --text-muted: #5f6368;
    --mode-switcher-bg: #f1f3f4;
}

[data-theme="dark"] {
    --primary: #60a5fa;
    --primary-light: #1e3a8a;
    --bg: #0f172a;
    --bg-soft: #1e293b;
    --bg-card: #1e293b;
    --text: #f1f5f9;
    --text-soft: #94a3b8;
    --border: #334155;
    --code-bg: #334155;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-hover: 0 8px 24px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.35);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --pitfall-bg: #450a0a;
    --pitfall-border: #7f1d1d;
    --formula-bg: #082f49;
    --formula-border: #0c4a6e;
    --example-bg: #052e16;
    --example-border: #14532d;
    /* frontend-design 暗模式语义 token */
    --diff-basic-bg: rgba(129,201,149,0.15);       --diff-basic-text: #81c995;
    --diff-intermediate-bg: rgba(253,214,99,0.15); --diff-intermediate-text: #fdd663;
    --diff-advanced-bg: rgba(242,139,130,0.15);    --diff-advanced-text: #f28b82;
    --status-mastered-bg: rgba(129,201,149,0.2);   --status-mastered-text: #81c995;
    --status-review-bg: rgba(253,214,99,0.2);      --status-review-text: #fdd663;
    --status-hard-bg: rgba(242,139,130,0.2);       --status-hard-text: #f28b82;
    --filter-banner-bg: #1e3a5f;
    --filter-banner-text: #8ab4f8;
    --btn-hover-bg: #2d3a4f;
    --mistake-book-bg: linear-gradient(135deg, #3a1515, #2a0e0e);
    --mistake-book-border: #f28b82;
    --mistake-book-title: #f28b82;
    --text-muted: #9aa0a6;
    --mode-switcher-bg: #2d3a4f;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: "Inter", "PingFang SC", "Microsoft YaHei", "Source Han Sans CN",
                 -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Helvetica Neue", Arial, sans-serif;
    background:
        radial-gradient(ellipse at top left, rgba(37, 99, 235, 0.06), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(245, 158, 11, 0.04), transparent 50%),
        var(--bg);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.7;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
}

[data-theme="dark"] body {
    background:
        radial-gradient(ellipse at top left, rgba(96, 165, 250, 0.08), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(251, 191, 36, 0.04), transparent 50%),
        var(--bg);
    background-attachment: fixed;
}

.app {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 60px 1fr;
    grid-template-areas:
        "header header"
        "sidebar main";
    min-height: 100vh;
}

.header {
    grid-area: header;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
}

.header-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60%;
}

.header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}

.btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.2s;
}

.btn-icon:hover {
    background: var(--bg-soft);
    border-color: var(--primary);
    color: var(--primary);
}

.sidebar {
    grid-area: sidebar;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    padding: 1.25rem;
    overflow-y: auto;
    height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
}

.sidebar-section {
    margin-bottom: 1.5rem;
}

.sidebar-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-soft);
    margin-bottom: 0.5rem;
}

.search-box {
    width: 100%;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 0.875rem;
    font-family: inherit;
}

.search-box:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
}

.nav-list {
    list-style: none;
}

.nav-item {
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-soft);
    font-size: 0.875rem;
    border-left: 3px solid transparent;
    margin-bottom: 0.125rem;
    transition: all 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.nav-item:hover {
    background: var(--bg-soft);
    color: var(--text);
}

.nav-item.active {
    background: var(--primary-light);
    color: var(--primary);
    border-left-color: var(--primary);
    font-weight: 500;
}

/* === 侧边栏两层结构（章+节）=== */
.nav-item--parent {
    padding: 0;
    border-left: none;
    margin-bottom: 0.25rem;
    overflow: visible;
    white-space: normal;
}

.nav-item-row {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 0.5rem 0.5rem 0.75rem;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
}

.nav-item-row:hover {
    background: var(--bg-soft);
}

.nav-item--parent.active > .nav-item-row {
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 500;
}

.nav-toggle {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 0.625rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.25rem;
    transition: transform 0.15s;
    flex-shrink: 0;
}

.nav-item--parent.collapsed .nav-toggle {
    transform: rotate(-90deg);
}

.nav-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.875rem;
}

.nav-page {
    font-size: 0.6875rem;
    color: var(--text-muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
}

.nav-sublist {
    list-style: none;
    margin: 0.125rem 0 0.375rem 1.5rem;
    border-left: 1px solid var(--border);
    padding-left: 0.5rem;
}

.nav-item--parent.collapsed .nav-sublist {
    display: none;
}

.nav-chapter-progress {
    padding: 0.25rem 0.75rem 0.5rem 1.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
}

.nav-chapter-progress .ncp-text {
    flex-shrink: 0;
    min-width: 80px;
}

.nav-chapter-progress .ncp-bar {
    flex: 1;
    height: 4px;
    background: var(--bg-soft);
    border-radius: 2px;
    overflow: hidden;
    min-width: 40px;
}

.nav-chapter-progress .ncp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--status-mastered-text));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.nav-chapter-progress .ncp-pct {
    flex-shrink: 0;
    font-weight: 600;
    color: var(--primary);
    min-width: 30px;
    text-align: right;
}

.nav-subitem {
    padding: 0.3rem 0.5rem;
    font-size: 0.8125rem;
    color: var(--text-soft);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 0.375rem;
    transition: background 0.15s, color 0.15s;
}

.nav-subitem:hover {
    background: var(--bg-soft);
    color: var(--primary);
}

.nav-subitem.active {
    background: var(--primary-light);
    color: var(--primary);
}

.nav-sub-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
}

.nav-subitem.active .nav-sub-dot {
    background: var(--primary);
}

.nav-sub-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.nav-sub-page {
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
}

.progress-stats {
    font-size: 0.75rem;
    color: var(--text-soft);
    padding: 0.5rem 0.75rem;
    background: var(--bg-soft);
    border-radius: var(--radius);
}

.progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 0.5rem;
}

.progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s;
}

.main {
    grid-area: main;
    padding: 2rem 2.5rem;
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
}

.book-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
}

.book-title {
    font-size: 1.875rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.3;
}

.book-meta {
    color: var(--text-soft);
    font-size: 0.875rem;
}

.chapter {
    margin-bottom: 3rem;
    scroll-margin-top: 120px;
}

.chapter-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    flex-wrap: wrap;
}

.chapter-title {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--text);
    line-height: 1.3;
}

.chapter-page {
    color: var(--text-soft);
    font-size: 0.875rem;
    background: var(--bg-soft);
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius);
    flex-shrink: 0;
}

/* 深度模式专属字段（默认隐藏） */
.deep-only { display: none; }
body.mode-deep .deep-only { display: block; }

.chapter-summary {
    color: var(--text-soft);
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: var(--bg-soft);
    border-left: 4px solid var(--primary);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 0.9375rem;
}

.chapter-jumpbar {
    position: sticky;
    top: 68px;
    z-index: 20;
    background: var(--bg);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0.625rem 0;
    margin: -0.5rem 0 1.25rem;
    border-bottom: 1px solid var(--border);
}

.jump-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.375rem 0.75rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-soft);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
}

.jump-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
}

.jump-btn.active {
    background: var(--primary);
    color: #ffffff;
    border-color: var(--primary);
}

.jump-icon {
    font-size: 0.875rem;
    line-height: 1;
}

.jump-badge {
    background: var(--bg-soft);
    padding: 0 6px;
    border-radius: 10px;
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 18px;
    text-align: center;
}

.jump-btn.active .jump-badge {
    background: rgba(255, 255, 255, 0.25);
    color: #ffffff;
}

/* === 卡片模式（背单词）modal === */
.flashcard-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fcFadeIn 0.2s ease;
}

@keyframes fcFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.flashcard-overlay[hidden] {
    display: none;
}

.flashcard-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

[data-theme="dark"] .flashcard-backdrop {
    background: rgba(0, 0, 0, 0.7);
}

.flashcard-container {
    position: relative;
    z-index: 1;
    width: min(820px, 94vw);
    height: min(620px, 90vh);
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(15, 23, 42, 0.35), 0 8px 24px rgba(15, 23, 42, 0.12);
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
    animation: fcSlideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}

[data-theme="dark"] .flashcard-container {
    background: rgba(30, 41, 59, 0.85);
    border-color: rgba(148, 163, 184, 0.15);
}

@keyframes fcSlideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.fc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.125rem 1.5rem 0.875rem;
}

.fc-header-info {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
}

.fc-title {
    font-size: 1.0625rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
}

.fc-progress {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--primary);
    font-size: 0.9375rem;
    background: var(--primary-light);
    padding: 2px 10px;
    border-radius: 12px;
}

.fc-close {
    background: transparent;
    border: none;
    color: var(--text-soft);
    font-size: 1.75rem;
    line-height: 1;
    cursor: pointer;
    padding: 0 0.5rem;
    transition: color 0.15s, transform 0.15s;
}

.fc-close:hover {
    color: var(--importance-core);
    transform: rotate(90deg);
}

.fc-progressbar {
    height: 3px;
    background: var(--bg-soft);
    overflow: hidden;
}

.fc-progressbar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #7c3aed);
    width: 0%;
    transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.fc-stage-wrap {
    display: grid;
    grid-template-columns: 56px 1fr 56px;
    align-items: stretch;
    min-height: 0;
}

.fc-nav {
    background: transparent;
    border: none;
    color: var(--text-soft);
    font-size: 2.75rem;
    line-height: 1;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    font-family: inherit;
}

.fc-nav:not(:disabled):hover {
    color: var(--primary);
    background: var(--primary-light);
}

.fc-nav:disabled {
    opacity: 0.25;
    cursor: not-allowed;
}

.flashcard-stage {
    padding: 1.5rem 2rem;
    overflow-y: auto;
    font-size: 1.0625rem;
    line-height: 1.8;
}

.flashcard-stage .card {
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    display: block;
    height: 100%;
}

.flashcard-stage .card::before {
    height: 4px;
    border-radius: 4px 4px 0 0;
}

.flashcard-stage .card-title {
    background: linear-gradient(180deg, rgba(37, 99, 235, 0.06), transparent);
    padding: 0.5rem 0 0.875rem;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
}

.flashcard-stage .card-title-text {
    font-size: 1.625rem;
    font-weight: 700;
    color: var(--text);
    display: block;
    margin-bottom: 0;
    letter-spacing: -0.02em;
    line-height: 1.3;
}

.flashcard-stage .card-body {
    padding: 0.5rem 0;
    font-size: 1.0625rem;
}

.flashcard-stage .card-body p {
    margin: 0.625rem 0;
}

.flashcard-stage .formula-block {
    font-size: 1.25rem;
    padding: 1.5rem;
    margin: 1rem 0;
    background: var(--bg-soft);
    border-radius: 12px;
    text-align: center;
}

.flashcard-stage .formula-explanation {
    font-size: 1rem;
    color: var(--text-soft);
    margin-top: 0.5rem;
}

.flashcard-stage .status-buttons {
    margin: 1.5rem 0 0.5rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
}

.flashcard-stage .status-btn {
    padding: 0.5rem 1rem;
    font-size: 0.9375rem;
    border-radius: 8px;
}

.fc-keyhint {
    padding: 0.625rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--bg-soft);
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.02em;
}

@media (max-width: 640px) {
    .flashcard-container {
        height: 92vh;
        border-radius: 16px;
    }
    .fc-stage-wrap {
        grid-template-columns: 40px 1fr 40px;
    }
    .flashcard-stage {
        padding: 1rem 1.25rem;
        font-size: 1rem;
    }
    .flashcard-stage .card-title-text {
        font-size: 1.375rem;
    }
}

.section-label {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text);
    margin: 1.75rem 0 0.875rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.section-label::before {
    content: '';
    width: 4px;
    height: 1.125rem;
    background: var(--primary);
    border-radius: 2px;
}

.section-label .label-text {
    flex: 1;
}

.section-label .label-count {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg-soft);
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 0.5rem;
    font-variant-numeric: tabular-nums;
}

/* 卡片模式触发按钮（带渐变 + logo）*/
.fc-trigger {
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    color: #ffffff;
    padding: 0.375rem 0.875rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.8125rem;
    font-weight: 500;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    box-shadow: 0 2px 6px rgba(37, 99, 235, 0.22);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-left: auto;
}

.fc-trigger:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
}

.fc-trigger:active {
    transform: translateY(0);
}

.fc-trigger-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
}

.card-grid {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}

.card-grid.formula-grid {
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
}

@media (max-width: 640px) {
    .card-grid,
    .card-grid.formula-grid {
        grid-template-columns: 1fr;
    }
}

.card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.55);
    border-radius: 16px;
    padding: 0;
    box-shadow: var(--shadow-card);
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

[data-theme="dark"] .card {
    background: rgba(30, 41, 59, 0.62);
    border-color: rgba(148, 163, 184, 0.12);
}

.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--primary);
    opacity: 0.85;
    transition: opacity 0.2s, height 0.2s;
    pointer-events: none;
    z-index: 1;
}

.card.importance-core::before { background: linear-gradient(90deg, var(--importance-core), #f97316); }
.card.importance-major::before { background: linear-gradient(90deg, var(--importance-major), var(--primary)); }
.card.importance-minor::before {
    background: linear-gradient(90deg, var(--text-muted), var(--text-muted));
    opacity: 0.4;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: var(--primary);
}

.card:hover::before {
    height: 4px;
    opacity: 1;
}

.card-title {
    padding: 0.875rem 1.125rem 0.75rem;
    background: linear-gradient(180deg, rgba(37, 99, 235, 0.04), transparent);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
}

[data-theme="dark"] .card-title {
    background: linear-gradient(180deg, rgba(96, 165, 250, 0.07), transparent);
}

.card-body {
    padding: 0.875rem 1.125rem 1.125rem;
    flex: 1;
}

.card-body p {
    margin: 0.25rem 0;
}

.card .status-buttons {
    margin: 0 1.125rem 0.875rem;
    padding-top: 0.625rem;
    border-top: 1px dashed var(--border);
}

.card.mastered {
    opacity: 0.55;
    background: var(--bg-soft);
}

.card.mastered .card-title-text::after {
    content: ' ✓';
    color: #10b981;
    font-weight: 600;
}

/* 难度标签 */
.diff-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
}
.diff-tag.diff-basic { background: var(--diff-basic-bg); color: var(--diff-basic-text); }
.diff-tag.diff-intermediate { background: var(--diff-intermediate-bg); color: var(--diff-intermediate-text); }
.diff-tag.diff-advanced { background: var(--diff-advanced-bg); color: var(--diff-advanced-text); }

/* 3 态状态按钮 */
.status-buttons {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
}
.status-btn {
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
}
.status-btn:hover { background: var(--btn-hover-bg); }
.status-btn:active { transform: scale(0.96); }
.status-btn.active { font-weight: 600; }
.status-btn[data-status="mastered"].active {
    background: var(--status-mastered-bg);
    color: var(--status-mastered-text);
    border-color: var(--status-mastered-text);
}
.status-btn[data-status="review"].active {
    background: var(--status-review-bg);
    color: var(--status-review-text);
    border-color: var(--status-review-text);
}
.status-btn[data-status="hard"].active {
    background: var(--status-hard-bg);
    color: var(--status-hard-text);
    border-color: var(--status-hard-text);
}

/* 卡片状态 - 用 ::before 顶部色带表示，不用 border-left 避免和 importance 冲突 */
.card.status-mastered {
    opacity: 0.7;
}
.card.status-mastered::before {
    background: linear-gradient(90deg, var(--status-mastered-text), #34d399) !important;
}
.card.status-review::before {
    background: linear-gradient(90deg, var(--status-review-text), #fbbf24) !important;
}
.card.status-hard {
    background: rgba(254, 226, 226, 0.5);
}
[data-theme="dark"] .card.status-hard {
    background: rgba(69, 10, 10, 0.45);
}
.card.status-hard::before {
    background: linear-gradient(90deg, var(--status-hard-text), #f87171) !important;
}

.filter-banner {
    background: var(--filter-banner-bg);
    color: var(--filter-banner-text);
    padding: 10px 16px;
    border-radius: 6px;
    margin: 12px 0;
    font-size: 13px;

/* 微交互加强（.card 的基础定义见上方，这里只补充 hover 增强）*/

}
button:focus-visible, .mode-btn:focus-visible {

    }
}
</style>

<script id="knowledge-data" type="application/json">__DATA_PLACEHOLDER__</script>
<script>
(function() {
  try {
    const dataEl = document.getElementById('knowledge-data');
    if (!dataEl) {
        document.getElementById('main-content').innerHTML = '<div class="empty-state">错误: 未找到数据脚本</div>';
        return;
    }
    const data = JSON.parse(dataEl.textContent);
    const main = document.getElementById('main-content');
    const navList = document.getElementById('nav-list');

    // 安全的 localStorage 包装（隐私模式 / 配额满 / Safari iframe 会抛 SecurityError）
    function safeLS(key, defaultValue) {
        try {
            const v = localStorage.getItem(key);
            return v === null ? defaultValue : v;
        } catch (e) {
            return defaultValue;
        }
    }
    function safeLSSet(key, value) {
        try { localStorage.setItem(key, value); } catch (e) { /* 配额满静默忽略 */ }
    }
    function safeLSJSON(key, defaultValue) {
        try {
            const v = localStorage.getItem(key);
            return v ? JSON.parse(v) : defaultValue;
        } catch (e) {
            return defaultValue;
        }
    }

    document.title = document.title.replace('[教材名称]', data.source || '复习笔记');
    document.getElementById('book-title-display').textContent = data.source || '复习笔记';

    const mastered = new Set(safeLSJSON('mastered-concepts', []));

    if (!data.chapters || data.chapters.length === 0) {
        main.innerHTML = '<div class="empty-state">暂无内容</div>';
        return;
    }

    function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function pageTag(page) {
        if (page == null) return '';
        if (Array.isArray(page)) page = page.join(',');
        return '<span class="card-page">p.' + page + '</span>';
    }

    function importanceClass(imp) {
        const v = (imp || '').toLowerCase();
        if (v === '核心' || v === 'critical' || v === 'high') return 'importance-core';
        if (v === '重要' || v === 'major' || v === 'medium') return 'importance-major';
        return 'importance-minor';
    }

    function difficultyClass(diff) {
        const v = (diff || '').toLowerCase();
        if (v === '基础' || v === 'basic') return 'diff-basic';
        if (v === '进阶' || v === 'intermediate') return 'diff-intermediate';
        if (v === '高难' || v === 'advanced' || v === 'hard') return 'diff-advanced';
        return '';
    }

    function difficultyTag(diff) {
        if (!diff) return '';
        const cls = difficultyClass(diff);
        const labels = {'diff-basic':'基础','diff-intermediate':'进阶','diff-advanced':'高难'};
        return '<span class="diff-tag ' + cls + '">' + (labels[cls] || escapeHtml(diff)) + '</span>';
    }

    // 3 态状态管理：mastered / review / hard
    function getConceptStatus() {
        return safeLSJSON('concept-status', {});
    }
    function saveConceptStatus(status) {
        safeLSSet('concept-status', JSON.stringify(status));
    }
    // 兼容旧 mastered Set
    function migrateMastered() {
        const status = getConceptStatus();
        let changed = false;
        mastered.forEach(function(id) {
            if (!status[id]) { status[id] = 'mastered'; changed = true; }
        });
        if (changed) saveConceptStatus(status);
        return status;
    }
    const conceptStatus = migrateMastered();

    function setConceptStatus(id, status) {
        if (status === null) {
            delete conceptStatus[id];
        } else {
            conceptStatus[id] = status;
        }
        saveConceptStatus(conceptStatus);
        const card = document.querySelector('[data-id="' + CSS.escape(id) + '"]');
        if (card) {
            card.classList.remove('status-mastered','status-review','status-hard');
            if (status) card.classList.add('status-' + status);
            const btns = card.querySelectorAll('.status-btn[data-action="concept-status"]');
            btns.forEach(function(b) { b.classList.remove('active'); });
            if (status) {
                const activeBtn = card.querySelector('.status-btn[data-status="' + status + '"]');
                if (activeBtn) activeBtn.classList.add('active');
            }
        }
        updateProgress();
        renderMistakeBook();
        syncFlashcardIfOpen();
    }

    function statusButtons(id) {
        const st = conceptStatus[id];
        const safeId = escapeHtml(id);
        return '<div class="status-buttons" data-concept-id="' + safeId + '" style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">' +
            '<button class="status-btn' + (st==='mastered'?' active':'') + '" data-action="concept-status" data-status="mastered" title="已掌握">✅ 已掌握</button>' +
            '<button class="status-btn' + (st==='review'?' active':'') + '" data-action="concept-status" data-status="review" title="待复习">🔍 待复习</button>' +
            '<button class="status-btn' + (st==='hard'?' active':'') + '" data-action="concept-status" data-status="hard" title="我不会 - 加入错题本">❌ 我不会</button>' +
            '</div>';
    }

    function renderConcepts(concepts) {
        if (!concepts || !concepts.length) return '';
        const cards = concepts.map((c) => {
            const id = c.id || c.name || ('c-' + Math.random().toString(36).slice(2, 9));
            const st = conceptStatus[id];
            const statusClass = st ? (' status-' + st) : '';
            const diffCls = difficultyClass(c.difficulty);
            const related = (c.related_to || []).map(function(r) {
                return '<span class="related-tag">' + escapeHtml(r) + '</span>';
            }).join('');
            const elements = (c.elements || []).map(function(e) {
                return '<p>• ' + escapeHtml(e) + '</p>';
            }).join('');
            const points = (c.points || []).map(function(p) {
                return '<p>• ' + escapeHtml(p) + '</p>';
            }).join('');
            const formula = c.formula ? '<div class="formula-block">' + escapeHtml(c.formula) + '</div>' : '';
            const pageData = (c.page != null) ? '" data-page="' + escapeHtml(String(c.page)) : '';
            return '<div class="card ' + importanceClass(c.importance) + diffCls + statusClass + '" data-id="' + escapeHtml(id) + pageData + '" data-search="' + escapeHtml((c.name || '') + ' ' + (c.definition || '')) + '">' +
                '<div class="card-title">' +
                    '<span class="card-title-text">' + escapeHtml(c.name || c.concept || '') + '</span>' +
                    difficultyTag(c.difficulty) +
                    pageTag(c.page) +
                '</div>' +
                '<div class="card-body">' +
                    (c.definition ? '<p>' + escapeHtml(c.definition) + '</p>' : '') +
                    elements + points + formula +
                    (c.types ? '<p><strong>类型:</strong> ' + escapeHtml(c.types.join('、')) + '</p>' : '') +
                    (c.boundary ? '<div class="deep-only" style="margin-top:8px;padding:8px 12px;background:var(--bg-soft);border-left:3px solid var(--status-review-text);border-radius:4px;"><strong style="color:var(--status-review-text);">⚠ 适用边界：</strong> ' + escapeHtml(c.boundary) + '</div>' : '') +
                    (c.variation ? '<div class="deep-only" style="margin-top:6px;padding:8px 12px;background:var(--bg-soft);border-left:3px solid var(--primary);border-radius:4px;"><strong style="color:var(--primary);">🔄 变形/等价表述：</strong> ' + escapeHtml(c.variation) + '</div>' : '') +
                    statusButtons(id) +
                '</div>' +
                (related ? '<div class="related-tags">' + related + '</div>' : '') +
            '</div>';
        }).join('');
        return '<div class="card-grid" data-fc-type="concepts">' + cards + '</div>';
    }

    function renderFormulas(formulas) {
        if (!formulas || !formulas.length) return '';
        const cards = formulas.map(function(f, idx) {
            const raw = f.latex || f.formula || '';
            const wrapped = wrapFormulaDelimiters(raw);
            return '<div class="card formula-card" data-search="' + escapeHtml((f.name || '') + ' ' + (f.explanation || '')) + '">' +
                '<div class="card-title">' +
                    '<span class="card-title-text">' + escapeHtml(f.name || '') + '</span>' +
                    pageTag(f.page) +
                '</div>' +
                '<div class="formula-block">' + escapeHtml(wrapped) + '</div>' +
                (f.explanation ? '<div class="formula-explanation">' + escapeHtml(f.explanation) + '</div>' : '') +
                (f.conditions ? '<div class="formula-explanation"><strong>适用条件:</strong> ' + escapeHtml(f.conditions) + '</div>' : '') +
            '</div>';
        }).join('');
        return '<div class="card-grid formula-grid" data-fc-type="formulas">' + cards + '</div>';
    }

    // 事件委托：处理 concept-status 按钮
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('[data-action="concept-status"]');
        if (!btn) {
            // 错题本"移除"按钮
            const mbBtn = e.target.closest('[data-action="mb-promote"]');
            if (mbBtn) {
                setConceptStatus(mbBtn.dataset.target, 'mastered');
            }
            return;
        }
        const container = btn.closest('[data-concept-id]');
        if (container) {
            setConceptStatus(container.dataset.conceptId, btn.dataset.status);
        }
    });

    function wrapFormulaDelimiters(latex) {
        if (!latex) return '';
        latex = cleanUnicodeMath(latex);
        const s = latex.trim();
        if (/^\$\$[\s\S]+\$\$$/.test(s)) return s;
        if (/^\$[^$]+\$/.test(s)) return s;
        if (/^\\\[[\s\S]+\\\]$/.test(s)) return s;
        if (/^\\\([\s\S]+\\\)$/.test(s)) return s;
        return '$$' + s + '$$';
    }

    function cleanUnicodeMath(s) {
        if (!s) return s;
        const map = {
            '√': '\\sqrt ', '≤': ' \\leq ', '≥': ' \\geq ',
            '∈': ' \\in ', '∉': ' \\notin ', '⊂': ' \\subset ', '⊃': ' \\supset ',
            '⊆': ' \\subseteq ', '⊇': ' \\supseteq ',
            '∪': ' \\cup ', '∩': ' \\cap ', '∅': ' \\emptyset ',
            '∀': ' \\forall ', '∃': ' \\exists ',
            '→': ' \\to ', '←': ' \\leftarrow ', '↔': ' \\leftrightarrow ',
            '⇒': ' \\Rightarrow ', '⇐': ' \\Leftarrow ', '⇔': ' \\Leftrightarrow ',
            '↦': ' \\mapsto ',
            '∞': ' \\infty ', '∂': ' \\partial ', '∇': ' \\nabla ',
            '×': ' \\times ', '÷': ' \\div ', '±': ' \\pm ', '∓': ' \\mp ',
            '⋅': ' \\cdot ', '∘': ' \\circ ', '⋆': ' \\star ',
            '…': ' \\ldots ', '⋯': ' \\cdots ', '⋮': ' \\vdots ', '⋱': ' \\ddots ',
            '≤f': ' \\le ', '≥f': ' \\ge ',
            'α': ' \\alpha ', 'β': ' \\beta ', 'γ': ' \\gamma ', 'δ': ' \\delta ',
            'ε': ' \\varepsilon ', 'ϵ': ' \\epsilon ', 'ζ': ' \\zeta ', 'η': ' \\eta ',
            'θ': ' \\theta ', 'ϑ': ' \\vartheta ', 'ι': ' \\iota ', 'κ': ' \\kappa ',
            'λ': ' \\lambda ', 'μ': ' \\mu ', 'ν': ' \\nu ', 'ξ': ' \\xi ',
            'π': ' \\pi ', 'ϖ': ' \\varpi ', 'ρ': ' \\rho ', 'ϱ': ' \\varrho ',
            'σ': ' \\sigma ', 'ς': ' \\varsigma ', 'τ': ' \\tau ', 'υ': ' \\upsilon ',
            'φ': ' \\varphi ', 'ϕ': ' \\phi ', 'χ': ' \\chi ', 'ψ': ' \\psi ',
            'ω': ' \\omega ',
            'Γ': ' \\Gamma ', 'Δ': ' \\Delta ', 'Θ': ' \\Theta ', 'Λ': ' \\Lambda ',
            'Ξ': ' \\Xi ', 'Π': ' \\Pi ', 'Σ': ' \\Sigma ', 'Υ': ' \\Upsilon ',
            'Φ': ' \\Phi ', 'Ψ': ' \\Psi ', 'Ω': ' \\Omega ',
            '–': '-', '—': '-', '‘': "'", '’': "'", '“': '"', '”': '"'
        };
        let out = s;
        for (const k in map) {
            if (map.hasOwnProperty(k)) {
                out = out.split(k).join(map[k]);
            }
        }
        return out.replace(/\s+/g, ' ').trim();
    }

    function renderPitfalls(pitfalls) {
        if (!pitfalls || !pitfalls.length) return '';
        const cards = pitfalls.map(function(p) {
            return '<div class="card pitfall-card" data-search="' + escapeHtml((p.warning || '') + ' ' + (p.correction || '')) + '">' +
                '<div class="card-title">' +

    function renderExamples(examples) {

        const cards = examples.map(function(e) {

    function renderConnections(connections) {
        if (!connections || !connections.length) return '';
        const items = connections.map(function(c) {
            const prefix = c.type === 'prerequisite' ? '前置:' : (c.type === 'foundation' ? '铺垫:' : '');

    const html = data.chapters.map(function(ch, idx) {
        const chid = ch.chapter_id || ('chapter-' + (idx + 1));
        const sec = {

        };
        const jumpItems = [
            { type: 'concepts', label: '核心概念', count: sec.concepts, icon: '◆' },

        const jumpBar = jumpItems.length ? '<nav class="chapter-jumpbar" data-chapter="' + chid + '">' +
            jumpItems.map(function(s) {

                        '<span class="jump-icon">' + s.icon + '</span>' +
                        '<span class="jump-label">' + s.label + '</span>' +
                        '<span class="jump-badge">' + s.count + '</span>' +
                    '</button>';
            }).join('') +
        '</nav>' : '';

        function sectionLabel(type, label, count) {
            return '<h3 class="section-label" id="' + type + '-' + chid + '">' +
                '<span class="label-text">' + label + '</span>' +
                '<span class="label-count">' + count + ' 个</span>' +
                '<button class="fc-trigger" data-fc-open="' + type + '" data-chapter="' + chid + '" title="' + label + '卡片模式">' +
                    '<svg class="fc-trigger-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">' +
                        '<rect x="2" y="3" width="12" height="10" rx="1.5"/>' +
                        '<path d="M5 6h6M5 8.5h6M5 11h3"/>' +
                    '</svg>' +
                    '卡片模式' +
                '</button>' +
            '</h3>';
        }

        return '<section class="chapter" id="' + chid + '">' +
            '<div class="chapter-header">' +
                '<h2 class="chapter-title">' + escapeHtml(ch.chapter_title || '') + '</h2>' +
                (ch.page_range ? '<span class="chapter-page">pp.' + escapeHtml(ch.page_range) + '</span>' : '') +
            '</div>' +
            (ch.summary ? '<div class="chapter-summary">' + escapeHtml(ch.summary) + '</div>' : '') +
            jumpBar +
            (sec.concepts ? sectionLabel('concepts', '核心概念', sec.concepts) + renderConcepts(ch.concepts) : '') +
            (sec.formulas ? sectionLabel('formulas', '重要公式', sec.formulas) + renderFormulas(ch.formulas) : '') +
            (sec.examples ? sectionLabel('examples', '典型例题', sec.examples) + renderExamples(ch.examples) : '') +
            (sec.pitfalls ? sectionLabel('pitfalls', '易错点', sec.pitfalls) + renderPitfalls(ch.pitfalls) : '') +
            (ch.connections && ch.connections.length ? '<h3 class="section-label section-connections"><span class="label-text">章节关联（深度）</span></h3>' + renderConnections(ch.connections) : '') +
        '</section>';
    }).join('');

    main.innerHTML = html;

    // === 卡片模式（背单词）状态机 ===
    const fcState = { type: null, chapterId: null, grid: null, idx: 0, count: 0 };
    const fcOverlay = document.getElementById('flashcard-overlay');
    const fcStage = document.getElementById('fc-stage');
    const fcProgress = document.getElementById('fc-progress');
    const fcTitle = document.getElementById('fc-title');
    const fcProgressFill = document.getElementById('fc-progressbar-fill');
    const fcPrevBtn = fcOverlay.querySelector('.fc-prev');
    const fcNextBtn = fcOverlay.querySelector('.fc-next');
    const fcTypeLabels = {
        concepts: '核心概念',
        formulas: '重要公式',
        examples: '典型例题',
        pitfalls: '易错点'
    };

    function renderFlashcard() {
        if (!fcState.grid) return;
        const cards = Array.from(fcState.grid.children);
        if (fcState.idx >= cards.length) return;
        // 重新从原 DOM 取最新 outerHTML（反映 conceptStatus 最新状态）
        fcStage.innerHTML = cards[fcState.idx].outerHTML;
        const pct = cards.length ? ((fcState.idx + 1) / cards.length * 100) : 0;
        fcProgress.textContent = (fcState.idx + 1) + ' / ' + cards.length;
        fcProgressFill.style.width = pct + '%';
        fcPrevBtn.disabled = fcState.idx === 0;
        fcNextBtn.disabled = fcState.idx === cards.length - 1;
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([fcStage]).catch(function(e) { console.warn('FC typeset:', e); });
        }
    }

    function openFlashcard(type, chapterId) {
        const chapter = document.getElementById(chapterId);
        if (!chapter) return;
        const grid = chapter.querySelector('.card-grid[data-fc-type="' + type + '"]');
        if (!grid || !grid.children.length) return;
        fcState.type = type;
        fcState.chapterId = chapterId;
        fcState.grid = grid;
        fcState.idx = 0;
        fcTitle.textContent = fcTypeLabels[type] || '卡片模式';
        fcOverlay.hidden = false;
        document.body.style.overflow = 'hidden';
        renderFlashcard();
    }

    function fcNext() {
        if (!fcState.grid) return;
        const total = fcState.grid.children.length;
        if (fcState.idx < total - 1) {
            fcState.idx++;
            renderFlashcard();
        }
    }

    function fcPrev() {
        if (fcState.idx > 0) {
            fcState.idx--;
            renderFlashcard();
        }
    }

    function closeFlashcard() {
        fcOverlay.hidden = true;
        document.body.style.overflow = '';
        fcState.grid = null;
    }

    // 状态联动：concept 状态变化时，如果 modal 打开且当前是 concept 卡片，重渲染 stage
    function syncFlashcardIfOpen() {
        if (!fcOverlay.hidden && fcState.grid) {
            renderFlashcard();
        }
    }

    document.addEventListener('click', function(e) {
        const openBtn = e.target.closest('[data-fc-open]');
        if (openBtn) {
            openFlashcard(openBtn.dataset.fcOpen, openBtn.dataset.chapter);
            return;
        }
        const action = e.target.closest('[data-action]') && e.target.closest('[data-action]').dataset.action;
        if (action === 'fc-close') closeFlashcard();
        else if (action === 'fc-next') fcNext();
        else if (action === 'fc-prev') fcPrev();
    });

    document.addEventListener('keydown', function(e) {
        if (fcOverlay.hidden) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); fcNext(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); fcPrev(); }
        else if (e.key === 'Escape') { e.preventDefault(); closeFlashcard(); }
    });

    let fcTouchX = 0;
    fcStage.addEventListener('touchstart', function(e) {
        fcTouchX = e.touches[0].clientX;
    }, { passive: true });
    fcStage.addEventListener('touchend', function(e) {
        const dx = e.changedTouches[0].clientX - fcTouchX;
        if (dx > 50) fcPrev();
        else if (dx < -50) fcNext();
    }, { passive: true });


    // 分章 MathJax typeset（避免一次性 typeset 数千公式卡死浏览器）
    if (window.MathJax && MathJax.typesetPromise) {
        const chapters = main.querySelectorAll('.chapter');
        if (chapters.length > 1) {
            // 异步分批 typeset
            let i = 0;
            function typesetNext() {
                if (i >= chapters.length) return;
                const ch = chapters[i++];
                MathJax.typesetPromise([ch]).then(typesetNext).catch(function(e) {
                    console.warn('MathJax typeset failed at chapter', i, e);
                    typesetNext();
                });
            }
            // 用 requestIdleCallback 避免阻塞首屏
            (window.requestIdleCallback || function(cb) { setTimeout(cb, 50); })(typesetNext);
        } else {
            MathJax.typesetPromise([main]).catch(function(e) {
                console.warn('MathJax typeset failed:', e);
            });
        }
    }

    // 智能虚拟节：按 page_range 切分；如果数据有真实 sections 优先用
    function clusterVirtualSections(ch, chid) {
        if (ch.sections && ch.sections.length) {
            return ch.sections.map(function(s) {
                return Object.assign({}, s, { isReal: true });
            });
        }
        const range = String(ch.page_range || '');
        const m = range.match(/(\d+)\s*[-–~]\s*(\d+)/);
        if (!m) {
            return [{
                section_id: chid + '-all',
                section_title: '全部',
                page_range: ch.range || null,
                isFallback: true
            }];
        }
        const start = parseInt(m[1]);
        const end = parseInt(m[2]);
        const total = end - start + 1;
        if (total <= 0) {
            return [{
                section_id: chid + '-all',
                section_title: '全部',
                page_range: range,
                isFallback: true
            }];
        }
        // 每节 5-10 页，目标 3-5 节
        let sectionSize;
        if (total <= 10) sectionSize = total;
        else if (total <= 20) sectionSize = Math.ceil(total / 3);
        else if (total <= 40) sectionSize = Math.ceil(total / 4);
        else sectionSize = 10;
        const sections = [];
        for (let ps = start; ps <= end; ps += sectionSize) {
            const pe = Math.min(ps + sectionSize - 1, end);
            const isSingle = ps === pe;
            sections.push({
                section_id: chid + '-p' + ps + '-' + pe,
                section_title: isSingle ? 'p.' + ps : 'p.' + ps + '-' + pe,
                page_range: ps + '-' + pe,
                pageStart: ps,
                pageEnd: pe,
                isVirtual: true
            });
        }
        return sections;
    }

    navList.innerHTML = data.chapters.map(function(ch, idx) {
        const chid = ch.chapter_id || ('chapter-' + (idx + 1));
        const title = escapeHtml(ch.chapter_title || ('第' + (idx+1) + '章'));
        const pg = ch.page_range ? '<span class="nav-page">p.' + escapeHtml(String(ch.page_range)) + '</span>' : '';

        const sections = clusterVirtualSections(ch, chid);

        const sectionItems = sections.map(function(s) {
            const sid = s.section_id || (chid + '-sec');
            const sTitle = escapeHtml(s.section_title || '节');
            const sPg = s.page_range ? '<span class="nav-sub-page">p.' + escapeHtml(String(s.page_range)) + '</span>' : '';
            // fallback / virtual 都指向 chapter（虚拟节点击走 pageStart 智能滚动）；real 指向 section-block
            const target = (s.isFallback || s.isVirtual) ? chid : sid;
            const dataAttrs = s.isVirtual
                ? ' data-page-start="' + s.pageStart + '" data-page-end="' + s.pageEnd + '"'
                : '';
            const cls = s.isFallback ? ' nav-subitem--fallback' : (s.isVirtual ? ' nav-subitem--virtual' : '');
            return '<li class="nav-subitem' + cls + '" data-target="' + escapeHtml(target) + '"' + dataAttrs + '>' +
                '<span class="nav-sub-dot"></span>' +
                '<span class="nav-sub-title">' + sTitle + '</span>' +
                sPg +
            '</li>';
        }).join('');

        return '<li class="nav-item nav-item--parent" data-target="' + chid + '">' +
            '<div class="nav-item-row">' +
                '<input type="checkbox" class="nav-chapter-checkbox" data-target="' + chid + '" checked style="flex-shrink:0;cursor:pointer;accent-color:#1a73e8;">' +
                '<button class="nav-toggle" data-target="' + chid + '" aria-expanded="true">▼</button>' +
                '<span class="nav-title">' + title + '</span>' +
                pg +
            '</div>' +
            '<div class="nav-chapter-progress" data-chapter="' + chid + '">' +
                '<span class="ncp-text">0 / 0 已掌握</span>' +
                '<div class="ncp-bar"><div class="ncp-fill" style="width:0%"></div></div>' +
                '<span class="ncp-pct">0%</span>' +
            '</div>' +
            '<ul class="nav-sublist">' + sectionItems + '</ul>' +
        '</li>';
    }).join('');

    // 章节复选框：实时筛选显示
    const chapterVisibility = safeLSJSON('chapter-visibility', {});
    navList.querySelectorAll('.nav-chapter-checkbox').forEach(function(cb) {
        const chid = cb.dataset.target;
        if (chapterVisibility[chid] === false) {
            cb.checked = false;
            const ch = document.getElementById(chid);
            if (ch) ch.style.display = 'none';
            const parent = cb.closest('.nav-item--parent');
            if (parent) parent.style.opacity = '0.4';
        }
        cb.addEventListener('change', function() {
            const target = document.getElementById(chid);
            if (target) {
                target.style.display = cb.checked ? '' : 'none';
            }
            const parent = cb.closest('.nav-item--parent');
            if (parent) parent.style.opacity = cb.checked ? '1' : '0.4';
            chapterVisibility[chid] = cb.checked;
            safeLSSet('chapter-visibility', JSON.stringify(chapterVisibility));
            updateChapterProgress();
        });
        cb.addEventListener('click', function(e) { e.stopPropagation(); });
    });

    // 折叠状态恢复
    navList.querySelectorAll('.nav-item--parent').forEach(function(parent) {
        const chid = parent.dataset.target;
        if (safeLS('nav-collapsed-' + chid, false)) {
            parent.classList.add('collapsed');
            const toggle = parent.querySelector('.nav-toggle');
            if (toggle) toggle.setAttribute('aria-expanded', 'false');
        }
    });

    navList.addEventListener('click', function(e) {
        const toggle = e.target.closest('.nav-toggle');
        if (toggle) {
            e.stopPropagation();
            const chid = toggle.dataset.target;
            const parent = toggle.closest('.nav-item--parent');
            if (!parent) return;
            const collapsed = parent.classList.toggle('collapsed');
            toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            safeLSSet('nav-collapsed-' + chid, collapsed);
            return;
        }
        if (e.target.tagName === 'INPUT') return;

        const subitem = e.target.closest('.nav-subitem');
        if (subitem) {
            const targetId = subitem.dataset.target;
            const pageStart = subitem.dataset.pageStart;
            const pageEnd = subitem.dataset.pageEnd;
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            // 虚拟节：找到第一个 data-page 在 [pageStart, pageEnd] 范围内的卡片
            if (pageStart && pageEnd) {
                const ps = parseInt(pageStart);
                const pe = parseInt(pageEnd);
                const chapter = document.getElementById(targetId);
                if (chapter) {
                    const cards = chapter.querySelectorAll('.card[data-page]');
                    let found = null;
                    for (const card of cards) {
                        const cp = parseInt(card.dataset.page);
                        if (!isNaN(cp) && cp >= ps && cp <= pe) { found = card; break; }
                    }
                    if (found) {
                        found.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        sidebar.classList.remove('open');
                        backdrop.classList.remove('show');
                    }
                    return;
                }
            }

            const target = document.getElementById(targetId);
            if (target && target.style.display !== 'none') {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                sidebar.classList.remove('open');
                backdrop.classList.remove('show');
            }
            return;
        }

        const parent = e.target.closest('.nav-item--parent');
        if (parent) {
            const target = document.getElementById(parent.dataset.target);
            if (target && target.style.display !== 'none') {
                target.scrollIntoView({ behavior: 'smooth' });
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-backdrop').classList.remove('show');
            }
        }
    });

    const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                const id = entry.target.id;
                navList.querySelectorAll('.nav-item').forEach(function(item) {
                    item.classList.toggle('active', item.dataset.target === id);
                });
                document.querySelectorAll('.jump-btn[data-jump]').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.jump === id);
                });
            }
        });
    }, { rootMargin: '-120px 0px -70% 0px' });

    document.querySelectorAll('.chapter').forEach(function(ch) { observer.observe(ch); });
    document.querySelectorAll('.section-label[id]').forEach(function(el) { observer.observe(el); });

    document.addEventListener('click', function(e) {
        const jumpBtn = e.target.closest('.jump-btn[data-jump]');
        if (jumpBtn) {
            const target = document.getElementById(jumpBtn.dataset.jump);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    });

    document.getElementById('search-input').addEventListener('input', function(e) {
        const q = e.target.value.trim().toLowerCase();
        document.querySelectorAll('[data-search]').forEach(function(el) {
            if (!q) { el.style.display = ''; return; }
            const text = (el.dataset.search || '').toLowerCase();
            el.style.display = text.includes(q) ? '' : 'none';
        });
    });

    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = safeLS('theme', 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '☀' : '🌙';

    themeToggle.addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        safeLSSet('theme', next);
        themeToggle.textContent = next === 'dark' ? '☀' : '🌙';
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }
    });

    document.getElementById('sidebar-toggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-backdrop').classList.toggle('show');
    });
    document.getElementById('sidebar-backdrop').addEventListener('click', function() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-backdrop').classList.remove('show');
    });

    window.toggleMastered = function(id) {
        if (mastered.has(id)) {
            mastered.delete(id);
        } else {
            mastered.add(id);
        }
        safeLSSet('mastered-concepts', JSON.stringify(Array.from(mastered)));
        updateProgress();
        const card = document.querySelector('[data-id="' + CSS.escape(id) + '"]');
        if (card) card.classList.toggle('mastered');
    };

    function updateProgress() {
        const total = document.querySelectorAll('.card[data-id]').length;
        const masteredCount = Object.values(conceptStatus).filter(s => s === 'mastered').length;
        const reviewCount = Object.values(conceptStatus).filter(s => s === 'review').length;
        const hardCount = Object.values(conceptStatus).filter(s => s === 'hard').length;
        const pct = total ? Math.round(masteredCount * 100 / total) : 0;
        const statsSidebar = document.getElementById('progress-stats');
        const fillSidebar = document.getElementById('progress-fill');
        if (statsSidebar) statsSidebar.textContent = '✅'+masteredCount+' / 🔍'+reviewCount+' / ❌'+hardCount+' / 共 '+total;
        if (fillSidebar) fillSidebar.style.width = pct + '%';
        updateChapterProgress();
    }

    function renderMistakeBook() {
        const hardIds = Object.keys(conceptStatus).filter(id => conceptStatus[id] === 'hard');
        let book = document.getElementById('mistake-book');
        if (hardIds.length === 0) {
            if (book) book.remove();
            return;
        }
        if (!book) {
            book = document.createElement('section');
            book.id = 'mistake-book';
            book.className = 'mistake-book';
            const main = document.getElementById('main-content');
            main.appendChild(book);
        }
        // 不用 outerHTML 克隆（克隆的按钮点击会更新原卡片，副本永远不变）
        // 改为基于 conceptStatus 重新渲染简化卡片
        const hardCards = hardIds.map(id => {
            // 在已渲染的 concepts 中找到对应数据
            const card = document.querySelector('.card[data-id="' + CSS.escape(id) + '"]');
            if (!card) return '';
            const name = card.querySelector('.card-title-text')?.textContent || '(未命名)';
            const def = card.querySelector('.concept-def')?.textContent || '';
            const page = card.querySelector('.page-tag')?.textContent || '';
            return '<div class="card concept-card status-hard" data-id="mb-' + escapeHtml(id) + '" data-mb-for="' + escapeHtml(id) + '">' +
                '<div class="card-header"><span class="card-title-text">' + escapeHtml(name) + '</span>' +
                (page ? '<span class="page-tag">' + escapeHtml(page) + '</span>' : '') + '</div>' +
                '<div class="concept-def">' + escapeHtml(def) + '</div>' +
                '<div class="status-buttons">' +
                '<button class="status-btn" data-action="mb-promote" data-target="' + escapeHtml(id) + '" title="标记为已掌握，从错题本移除">✅ 已掌握</button>' +
                '</div></div>';
        }).join('');
        book.innerHTML = '<h2>❌ 我的错题本（' + hardIds.length + ' 个）</h2>' +
            '<p style="color:var(--text-muted);font-size:13px;margin-bottom:12px;">点击"✅ 已掌握"可从错题本移除</p>' +
            '<div class="card-grid">' + hardCards + '</div>';
    }

    function updateChapterProgress() {
        const allChapters = document.querySelectorAll('.chapter');
        const visibleChapters = Array.from(allChapters).filter(ch => ch.style.display !== 'none');
        const totalChapters = allChapters.length;
        const visibleCount = visibleChapters.length;

        // 章级进度：当前可见章 / 总章数
        const statsTop = document.getElementById('progress-stats-top');
        const fillTop = document.getElementById('progress-fill-top');
        if (statsTop) {
            statsTop.textContent = '正在复习 ' + visibleCount + ' / ' + totalChapters + ' 章';
        }
        if (fillTop) {
            fillTop.style.width = (totalChapters ? Math.round(visibleCount * 100 / totalChapters) : 0) + '%';
        }

        // 主区域顶部加提示条（如果没有）
        let banner = document.getElementById('chapter-filter-banner');
        if (!banner) {
            banner = document.createElement('div');
            banner.id = 'chapter-filter-banner';
            banner.className = 'filter-banner';
            banner.style.cssText = '';
            const main = document.getElementById('main-content');
            main.insertBefore(banner, main.firstChild);
        }
        if (visibleCount < totalChapters) {
            banner.textContent = '📋 当前显示 ' + visibleCount + ' / ' + totalChapters + ' 章（其他章已在侧边栏取消勾选）。改回去请到左侧"章节导航"勾选。';
            banner.style.display = 'block';
        } else {
            banner.style.display = 'none';
        }

        updatePerChapterProgress();
    }

    // 每章独立进度（已掌握 concept 数 / 该章总 concept 数）
    function updatePerChapterProgress() {
        document.querySelectorAll('.nav-chapter-progress').forEach(function(prog) {
            const chid = prog.dataset.chapter;
            const chapter = document.getElementById(chid);
            if (!chapter) return;
            const cards = chapter.querySelectorAll('.card[data-id]');
            const total = cards.length;
            let mastered = 0;
            cards.forEach(function(c) {
                if (conceptStatus[c.dataset.id] === 'mastered') mastered++;
            });
            const pct = total ? Math.round(mastered * 100 / total) : 0;
            const text = prog.querySelector('.ncp-text');
            const fill = prog.querySelector('.ncp-fill');
            const pctEl = prog.querySelector('.ncp-pct');
            if (text) text.textContent = mastered + ' / ' + total + ' 已掌握';
            if (fill) fill.style.width = pct + '%';
            if (pctEl) pctEl.textContent = pct + '%';
        });
    }

    // 全选/全不选按钮
    document.getElementById('select-all-chapters').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-chapter-checkbox').forEach(function(cb) {
            cb.checked = true;
            cb.dispatchEvent(new Event('change'));
        });
    });
    document.getElementById('select-none-chapters').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-chapter-checkbox').forEach(function(cb) {
            cb.checked = false;
            cb.dispatchEvent(new Event('change'));
        });
    });

    updateProgress();
    renderMistakeBook();

    // === 学习模式切换 (#1) ===
    const modeSwitcher = document.getElementById('mode-switcher');
    if (modeSwitcher) {
        const savedMode = safeLS('learn-mode', 'standard');
        setMode(savedMode);
        modeSwitcher.querySelectorAll('.mode-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                setMode(btn.dataset.mode);
            });
        });
    }
    function setMode(mode) {
        document.body.classList.remove('mode-quick','mode-standard','mode-deep');
        document.body.classList.add('mode-' + mode);
        if (modeSwitcher) {
            modeSwitcher.querySelectorAll('.mode-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.mode === mode);
            });
        }
        safeLSSet('learn-mode', mode);

        // 三档差异化：
        // 速通 ⚡：只看核心，隐藏 examples / connections / 高难 / 次要概念 / 公式条件 / 关联标签
        // 标准 📖：常规复习，显示主要内容（默认）
        // 深度 🎓：精读模式，额外显示 boundary / variation / connections / 章节摘要
        const show = function(sel, yes) {
            document.querySelectorAll(sel).forEach(function(el) {
                el.style.display = yes ? '' : 'none';
            });
        };

        const isQuick = mode === 'quick';
        const isDeep = mode === 'deep';

        // 速通隐藏的元素（标准和深度都显示）
        show('.example-card', !isQuick);
        show('.related-tags', !isQuick);
        show('.diff-advanced', !isQuick);
        show('.importance-minor', !isQuick);  // 次要概念
        show('.formula-explanation', !isQuick);  // 公式详细解释
        show('.chapter-summary', !isQuick);  // 章节摘要

        // 深度独有：boundary / variation / connections
        // 这些字段在概念卡里默认 hidden（CSS .deep-only），只在 mode-deep 下显示
        show('.deep-only', isDeep);

        // 深度模式：connections 章节
        show('.section-connections', isDeep);
    }

    // === 历史进度续学 (#5) ===
    const lastScroll = safeLS('last-scroll-position', null);
    if (lastScroll && parseInt(lastScroll) > 500) {
        setTimeout(function() {
            if (confirm('📍 上次复习到这里，要继续吗？')) {
                window.scrollTo(0, parseInt(lastScroll));
            }
        }, 500);
    }
    let scrollTimer = null;
    window.addEventListener('scroll', function() {
        if (scrollTimer) clearTimeout(scrollTimer);
        scrollTimer = setTimeout(function() {
            safeLSSet('last-scroll-position', window.scrollY);
        }, 1000);
    });

    const ts = document.createElement('div');
    ts.style.cssText = 'text-align:center;color:var(--text-soft);font-size:0.75rem;padding:2rem 0;border-top:1px solid var(--border);margin-top:3rem';
    ts.textContent = '生成时间: [时间戳]';
    main.appendChild(ts);
  } catch (err) {
    console.error('[exam-review-helper] 渲染失败:', err);
    const main = document.getElementById('main-content');
    if (main) {
        main.innerHTML = '<div class="empty-state" style="color:#dc2626;padding:2rem;text-align:left;">' +
            '<strong>渲染失败:</strong> ' + (err && err.message ? err.message : err) +
            '<br><br>请按 F12 打开开发者工具查看完整错误。</div>';
    }
  }
})();
</script>
</body>
</html>
